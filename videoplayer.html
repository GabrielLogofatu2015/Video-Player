<!DOCTYPE html>
<html>
<head>
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            width: 80%;
            max-width: 900px;
            text-align: center;
        }

        video {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            background: black;
            margin-top: 20px;
        }

        video::-internal-media-controls-download-button {
            display:none;
        }
        video::-webkit-media-controls-enclosure {
            overflow:hidden;
        }
        video::-webkit-media-controls-panel {
            width: calc(100% + 30px);
        }

        .controls {
            margin-bottom: 20px;
            padding: 20px;
            background: #222;
            border-radius: 10px;
            border: 1px solid #333;
        }

        input[type="file"] {
            cursor: pointer;
        }

        h2 { margin: 0 0 5px 0; color: #aaa; }
        
        .sub-text {
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls">
            <h2>My Video Player</h2>
            <span class="sub-text">Play any video from your device! Supported: mp4, webm, mov, mkn.</span>
            <input type="file" id="fileInput" accept=".mp4, .webm, .mov, .mkv">
        </div>

        <video id="mainPlayer" controls controlsList="nodownload">
            Your browser does not support the video tag.
        </video>
        
        <p id="fileName" style="margin-top: 10px; color: #666;"></p>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const videoPlayer = document.getElementById('mainPlayer');
        const fileNameDisplay = document.getElementById('fileName');

        fileInput.onchange = function() {
            const files = fileInput.files;
            
            if (files.length > 0) {
                const file = files[0];
                const fileURL = URL.createObjectURL(file);
                
                videoPlayer.src = fileURL;
                videoPlayer.play();
                
                fileNameDisplay.innerText = "Now Playing: " + file.name;
            }
        };

        videoPlayer.onloadstart = function() {
            if (videoPlayer.src.startsWith('blob:')) {
                URL.revokeObjectURL(this.src); 
            }
        };
    </script>
</body>
</html>
